<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SMURD Programări v6.2.1 - FINAL</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

  <style>
    :root { 
      --primary: #2563eb; --danger: #dc2626; --success: #16a34a; --warning: #f59e0b;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --text: #0f172a;
    }
    body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--text); margin: 0; padding-bottom: 50px; }
    
    /* MODAL ADMIN FLOTANT */
    #loginModal { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(5px); z-index: 9999; 
      align-items: center; justify-content: center; 
    }
    .modal-content { background: white; padding: 2rem; border-radius: 16px; width: 90%; max-width: 350px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

    /* LAYOUT PRINCIPAL */
    .header { background: white; border-bottom: 1px solid var(--gray-200); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    @media (min-width: 1024px) { .container { grid-template-columns: 380px 1fr; } }
    
    .card { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 1.5rem; margin-bottom: 1.5rem; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; justify-content: center; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--gray-200); color: var(--text); }
    
    /* CALENDAR & TIME SLOTS */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 1rem; }
    .cal-day { aspect-ratio: 1; border: 1px solid var(--gray-200); border-radius: 8px; background: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cal-day.selected { background: var(--primary) !important; color: white !important; }
    .day-free { background: #f0fdf4; color: #166534; }
    .day-full { background: #fee2e2; color: #991b1b; }
    .day-past { opacity: 0.4; cursor: not-allowed; background: var(--gray-100); }

    .time-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
    .time-slot { padding: 10px; border: 1px solid var(--gray-200); border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
    .time-slot.active { background: var(--primary); color: white; }
    .time-slot.taken { background: #fee2e2; color: #991b1b; cursor: not-allowed; }
    .time-slot.admin-overlap { background: #f59e0b !important; color: white !important; } /* Culoare specială pt suprapuneri admin */
    
    .locked-overlay { opacity: 0.4; pointer-events: none !important; filter: grayscale(1); }
    #maintBar { display: none; background: var(--danger); color: white; text-align: center; padding: 10px; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }

    input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--gray-200); margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { padding: 8px; border-bottom: 1px solid var(--gray-200); text-align: left; }

    /* PRINT AREA */
    #printArea { display: none; }
    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
      .p-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #000; border-left: 1px solid #000; }
      .p-cell { border-right: 1px solid #000; border-bottom: 1px solid #000; min-height: 120px; padding: 5px; font-size: 10px; }
      .p-day-num { font-weight: bold; border-bottom: 1px solid #ddd; display: block; margin-bottom: 4px; font-size: 14px; }
      .p-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; background: #eee !important; border-left: 1px solid #000; border-top: 1px solid #000; }
      .p-header div { border-right: 1px solid #000; padding: 5px; }
    }
  </style>
</head>
<body>

<div id="loginModal">
  <div class="modal-content">
    <h3 style="margin-top:0;">🔓 Acces Administrator</h3>
    <input type="email" id="admEmail" placeholder="Email">
    <input type="password" id="admPass" placeholder="Parolă">
    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" style="flex:1;" onclick="doAuth()">Login</button>
      <button class="btn btn-outline" onclick="closeAuth()">X</button>
    </div>
  </div>
</div>

<header class="header">
  <div style="font-weight:bold;">🚑 SMURD Programări v6.2.1</div>
  <div>
    <button class="btn btn-primary" id="loginBtn" onclick="openAuth()">🔓 Admin</button>
    <button class="btn btn-danger" id="logoutBtn" style="display:none;" onclick="admOut()">🔒 Ieșire</button>
  </div>
</header>

<div class="container">
  <aside>
    <div id="maintBar">⚠️ MOD MENTENANȚĂ ACTIV</div>
    
    <div class="card" id="uAuth">
      <h3>🔑 Identificare</h3>
      <input type="text" id="pAuth" placeholder="Telefon..." oninput="vPh()">
      <div id="authMsg" style="margin-top:10px;"></div>
    </div>

    <div class="card" id="admSel" style="display:none;">
      <h3>👤 Voluntar (Admin)</h3>
      <select id="vSel"></select>
    </div>

    <div class="card locked-overlay" id="tBox">
      <h3>🕒 Interval Orar</h3>
      <div class="time-grid" id="tGrid"></div>
      <button id="cBtn" class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="saveB()" disabled>Confirmă</button>
    </div>
  </aside>

  <main>
    <div class="card locked-overlay" id="cBox">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="mLab" style="margin:0;">Calendar</h3>
        <div style="display:flex; gap:5px;">
          <button class="btn btn-outline" onclick="chM(-1)">←</button>
          <button class="btn btn-outline" onclick="chM(1)">→</button>
        </div>
      </div>
      <div class="calendar-grid" id="cGrid"></div>
    </div>

    <div id="admP" style="display:none;">
      <div class="card" style="border: 2px solid var(--warning);">
        <h3>⚙️ Admin Panel</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
           <label><input type="checkbox" id="mTog" onchange="tglM(this.checked)"> Mod Mentenanță</label>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-success" onclick="prepPrint()">🖨️ Print Luna</button>
            <button class="btn btn-outline" onclick="exportData()">📥 Backup JSON</button>
        </div>
      </div>

      <div class="card">
        <h3>📋 Audit Programări</h3>
        <div style="max-height:300px; overflow-y:auto;">
          <table>
            <thead><tr><th>Voluntar</th><th>Data</th><th>Interval</th><th>Sursă</th></tr></thead>
            <tbody id="bTab"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>👥 Gestiune Whitelist</h3>
        <textarea id="vInput" rows="3" placeholder="Nume, Telefon (unul pe rând)"></textarea>
        <button class="btn btn-primary" style="width:100%;" onclick="impV()">Adaugă Voluntar</button>
        <div style="max-height:200px; overflow-y:auto; margin-top:15px;">
            <table id="vTable">
                <thead><tr><th>Nume</th><th>Telefon</th><th>Acțiune</th></tr></thead>
                <tbody id="vList"></tbody>
            </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="printArea">
  <h2 id="pTitle" style="text-align:center;"></h2>
  <div class="p-header">
    <div>Luni</div><div>Marți</div><div>Miercuri</div><div>Joi</div><div>Vineri</div><div>Sâmbătă</div><div>Duminică</div>
  </div>
  <div id="pGrid" class="p-grid"></div>
</div>

<script>
  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDlpy92yTmFVzrvF5sGfT50pEipMx3k2Pg",
    authDomain: "rezervari-smurd.firebaseapp.com",
    databaseURL: "https://rezervari-smurd-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "rezervari-smurd",
    storageBucket: "rezervari-smurd.firebasestorage.app",
    messagingSenderId: "694856921809",
    appId: "1:694856921809:web:de6e004fd6a9cd5f4c0bf0"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database(), auth = firebase.auth();

  let curD = new Date(), selD = null, selS = null, selE = null;
  let bks = [], vols = [], isA = false, isM = false;
  const hrs = []; for(let i=8; i<=21; i++) hrs.push(`${String(i).padStart(2,'0')}:00`);

  // AUTH
  function openAuth() { document.getElementById("loginModal").style.display = "flex"; }
  function closeAuth() { document.getElementById("loginModal").style.display = "none"; }
  function doAuth() {
    const e = document.getElementById("admEmail").value, p = document.getElementById("admPass").value;
    auth.signInWithEmailAndPassword(e, p).then(() => closeAuth()).catch(err => alert(err.message));
  }
  function admOut() { auth.signOut().then(() => location.reload()); }

  // LOCK LOGIC (MODIFICATĂ)
  function lk(b) { 
    if (isA) b = false; // Adminul vede totul deblocat mereu
    const cb = document.getElementById("cBox"), tb = document.getElementById("tBox");
    b ? (cb.classList.add("locked-overlay"), tb.classList.add("locked-overlay")) 
      : (cb.classList.remove("locked-overlay"), tb.classList.remove("locked-overlay"));
  }

  // TIME SELECTION (MODIFICATĂ PT ADMIN OVERLAP)
  function rSlt() {
    const g = document.getElementById("tGrid"); g.innerHTML = ""; if(!selD) return;
    const dBs = bks.filter(b => new Date(b.date).toDateString() === selD.toDateString());
    hrs.forEach((h, i) => {
      const s = document.createElement("div"); s.className = "time-slot"; s.innerText = h;
      const isTaken = dBs.some(b => h >= b.start && h < b.end);
      
      if(isTaken && !isA) s.classList.add("taken");
      else {
        if(isTaken && isA) s.style.border = "2px dashed var(--warning)"; // Vizual pt Admin
        if((selS!==null && i===selS) || (selE!==null && i===selE) || (selS!==null && selE!==null && i > Math.min(selS, selE) && i < Math.max(selS, selE))) s.classList.add("active");
        
        s.onclick = () => {
          if(selS===null || (selS!==null && selE!==null)) { selS=i; selE=null; }
          else {
            const min = Math.min(selS, i), max = Math.max(selS, i);
            const hasOverlap = dBs.some(b => hrs.indexOf(b.start) < max && (b.end==="22:00"?22:hrs.indexOf(b.end)) > min);
            if(hasOverlap && !isA) return alert("Interval ocupat!"); // Voluntarul e blocat, Adminul trece
            selE=i;
          }
          rSlt(); document.getElementById("cBtn").disabled = (selS===null || selE===null);
        };
      }
      g.appendChild(s);
    });
  }

  // FIREBASE SYNC
  db.ref('settings/maintenance').on('value', s => { isM = s.val()===true; document.getElementById("maintBar").style.display = isM?"block":"none"; if(!isA) vPh(); });
  
  auth.onAuthStateChanged(u => { 
    isA = !!u; 
    lk(!isA); // Deblocare automată pt admin la login
    document.getElementById("admP").style.display = isA?"block":"none";
    document.getElementById("admSel").style.display = isA?"block":"none";
    document.getElementById("uAuth").style.display = isA?"none":"block";
    document.getElementById("loginBtn").style.display = isA?"none":"inline-flex";
    document.getElementById("logoutBtn").style.display = isA?"inline-flex":"none";
    if(!isA) vPh();
    rCal();
  });

  db.ref('bookings').on('value', s => { bks = s.val() ? Object.keys(s.val()).map(k => ({id:k, ...s.val()[k]})) : []; rCal(); rBTab(); if(selD) rSlt(); });
  db.ref('volunteers').on('value', s => { 
    vols = s.val() ? Object.keys(s.val()).map(k => ({id:k, ...s.val()[k]})) : []; 
    const vS = document.getElementById("vSel"); vS.innerHTML = vols.sort((a,b)=>a.name.localeCompare(b.name)).map(v => `<option value="${v.phone}">${v.name}</option>`).join('');
    renderVList();
  });

  // FUNCTIONS
  function vPh() {
    if(isA) return lk(false);
    if(isM) return lk(true);
    const p = document.getElementById("pAuth").value.trim(), v = vols.find(u => u.phone === p);
    if(v && p!=="") { lk(false); document.getElementById("authMsg").innerHTML = "✅ Bun venit, " + v.name; searchMyB(p); }
    else { lk(true); document.getElementById("authMsg").innerHTML = p===""?"":"❌ Acces refuzat"; }
  }

  function searchMyB(p) {
    const my = bks.filter(b => b.phone === p).sort((a,b) => new Date(a.date) - new Date(b.date));
    if(my.length > 0) {
        let h = "<div style='background:#f1f5f9; padding:10px; border-radius:8px; font-size:0.8rem; margin-top:10px;'><b>Gărzile tale:</b><ul style='margin:5px 0; padding-left:15px;'>";
        my.forEach(b => h += `<li>${new Date(b.date).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit'})}: ${b.start}-${b.end}</li>`);
        document.getElementById("authMsg").innerHTML += h + "</ul></div>";
    }
  }

  function saveB() {
    let n, p; const min = Math.min(selS, selE), max = Math.max(selS, selE);
    if(isA) { const s = document.getElementById("vSel"); p = s.value; n = s.options[s.selectedIndex].text; }
    else { p = document.getElementById("pAuth").value.trim(); n = vols.find(u=>u.phone===p).name; }
    db.ref('bookings').push({ name:n, phone:p, date:selD.toISOString(), start:hrs[min], end:hrs[max+1]||"22:00", auditUser:isA?"Admin":"Voluntar", auditTime:new Date().toLocaleString() })
      .then(() => { selS=null; selE=null; rSlt(); alert("Programare salvată!"); });
  }

  function rCal() {
    const g = document.getElementById("cGrid"); g.innerHTML = "";
    document.getElementById("mLab").innerText = curD.toLocaleString('ro-RO', {month:'long', year:'numeric'});
    const y = curD.getFullYear(), m = curD.getMonth(), last = new Date(y, m+1, 0).getDate();
    for(let i=1; i<=last; i++) {
      const d = new Date(y, m, i), btn = document.createElement("button"); btn.className = "cal-day"; btn.innerText = i;
      const dBs = bks.filter(b => new Date(b.date).toDateString() === d.toDateString());
      if(d < new Date().setHours(0,0,0,0) && !isA) btn.classList.add("day-past");
      else {
        btn.classList.add(dBs.length >= 4 ? "day-full" : "day-free");
        btn.onclick = () => { selD = d; selS=null; selE=null; rCal(); rSlt(); };
      }
      if(selD && d.toDateString() === selD.toDateString()) btn.classList.add("selected");
      g.appendChild(btn);
    }
  }

  function rBTab() { 
    const t = document.getElementById("bTab"); t.innerHTML = ""; 
    bks.sort((a,b)=>new Date(b.auditTime)-new Date(a.auditTime)).slice(0,50).forEach(b => {
      t.innerHTML += `<tr><td>${b.name}</td><td>${new Date(b.date).toLocaleDateString()}</td><td>${b.start}-${b.end}</td><td>${b.auditUser}</td></tr>`;
    });
  }

  // WHITELIST MGT
  function impV() { 
    const i = document.getElementById("vInput").value.split(','); 
    if(i.length===2) db.ref('volunteers').push({name:i[0].trim(), phone:i[1].trim()}).then(()=>document.getElementById("vInput").value="");
  }
  function renderVList() {
    const l = document.getElementById("vList"); l.innerHTML = "";
    vols.forEach(v => l.innerHTML += `<tr><td>${v.name}</td><td>${v.phone}</td><td><button onclick="delV('${v.id}')">❌</button></td></tr>`);
  }
  function delV(id) { if(confirm("Ștergi voluntarul?")) db.ref('volunteers/'+id).remove(); }

  // PRINT
  function prepPrint() {
    const pG = document.getElementById("pGrid"); pG.innerHTML = "";
    document.getElementById("pTitle").innerText = "GĂRZI SMURD - " + document.getElementById("mLab").innerText;
    const y = curD.getFullYear(), m = curD.getMonth(), first = new Date(y, m, 1).getDay();
    const offset = (first === 0) ? 6 : first - 1;
    for(let i=0; i<offset; i++) pG.innerHTML += '<div class="p-cell"></div>';
    for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
        const dStr = new Date(y, m, d).toDateString();
        const dB = bks.filter(b => new Date(b.date).toDateString() === dStr).sort((a,b)=>a.start.localeCompare(b.start));
        let h = `<div class="p-cell"><span class="p-day-num">${d}</span>`;
        dB.forEach(b => h += `<div><b>${b.start}-${b.end}</b>: ${b.name}</div>`);
        pG.innerHTML += h + `</div>`;
    }
    window.print();
  }

  function chM(o) { curD.setMonth(curD.getMonth()+o); rCal(); }
  function tglM(v) { db.ref('settings/maintenance').set(v); }
  function exportData() { db.ref().once('value', s => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(s.val())],{type:'application/json'})); a.download='backup_smurd.json'; a.click(); }); }

  rCal();
</script>
</body>
</html>
